<!DOCTYPE html>
<html>

<body>

    {% if user.is_authenticated %}
    <p>
        {{ user.username }} |

    <form method="POST" action="{% url 'logout' %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>
    </p>
    {% endif %}

    <hr>

    {% block content %}{% endblock %}

</body>

</html>
